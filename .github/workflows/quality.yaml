name: Quality
on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  test:
    name: quality
    runs-on: ubuntu-24.04
    steps:
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.26'
          cache: 'true'

      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Go Cache
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}-

      - name: test
        run: |
          go install go.uber.org/mock/mockgen@latest
          go mod download
          make test
          make cover

      # Sonar itself runs in the deferred "SonarCloud" workflow (triggered via
      # workflow_run), which has access to secrets even for PRs from Dependabot /
      # forks. Here we only publish the coverage report and the analysis context.
      # PR fields (esp. head.ref) are user-controlled, so bind them to env vars
      # instead of interpolating into the shell to avoid script injection.
      - name: Save analysis metadata
        env:
          SONAR_EVENT: ${{ github.event_name }}
          SONAR_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          {
            echo "SONAR_EVENT=$SONAR_EVENT"
            echo "SONAR_SHA=$SONAR_SHA"
            echo "PR_NUMBER=$PR_NUMBER"
            echo "PR_HEAD_REF=$PR_HEAD_REF"
            echo "PR_BASE_REF=$PR_BASE_REF"
          } > sonar-meta.env

      - name: Upload analysis data
        uses: actions/upload-artifact@v4
        with:
          name: sonar-data
          path: |
            coverage.txt
            sonar-meta.env
          retention-days: 1
