name: Quality
on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  test:
    name: quality
    runs-on: ubuntu-24.04
    steps:
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.26'
          cache: 'true'

      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Go Cache
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}-

      - name: test
        run: |
          go install go.uber.org/mock/mockgen@latest
          go mod download
          make test
          make cover

      # Sonar itself runs in the deferred "SonarCloud" workflow (triggered via
      # workflow_run), which has access to secrets even for PRs from Dependabot /
      # forks. Here we only publish the coverage report and the analysis context.
      - name: Save analysis metadata
        run: |
          {
            echo "SONAR_EVENT=${{ github.event_name }}"
            echo "SONAR_SHA=${{ github.event.pull_request.head.sha || github.sha }}"
            echo "PR_NUMBER=${{ github.event.pull_request.number }}"
            echo "PR_HEAD_REF=${{ github.event.pull_request.head.ref }}"
            echo "PR_BASE_REF=${{ github.event.pull_request.base.ref }}"
          } > sonar-meta.env

      - name: Upload analysis data
        uses: actions/upload-artifact@v4
        with:
          name: sonar-data
          path: |
            coverage.txt
            sonar-meta.env
          retention-days: 1
